<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity Web Player | Yahtzee</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
      }
      
      #unity-container {
        position: absolute;
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
      }
      
      #unity-canvas {
        width: 100%;
        height: 100%;
        object-fit: contain; /* or 'cover' to fill the entire area */
        background-color: #231F20;
      }
      
      /* Optional: Adjust loading bar position */
      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: none;
      }
      
      #unity-warning {
        position: absolute;
        left: 0;
        right: 0;
        top: 10%;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Yahtzee</div>
      </div>
    </div>
    
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var container = document.querySelector("#unity-container");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      // Handle window resize
      function handleResize() {
        // The canvas will automatically scale with CSS
        // This ensures the Unity instance knows about the new size
        if (unityInstance) {
          // Optionally trigger a resize event in Unity if needed
        }
      }

      window.addEventListener('resize', handleResize);

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/GameWeb.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/GameWeb.data",
        frameworkUrl: buildUrl + "/GameWeb.framework.js",
        codeUrl: buildUrl + "/GameWeb.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Yahtzee",
        productVersion: "1.02",
        showBanner: unityShowBanner,
        // Match WebGL render target to canvas display size
        matchWebGLToCanvasSize: true,
        // Use device pixel ratio for sharper display on high-DPI screens
        devicePixelRatio: window.devicePixelRatio
      };

      // Remove the old desktop/mobile specific canvas size settings
      // as we're now using CSS for responsive sizing

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          window.unityInstance = unityInstance; // Store for resize handler
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
          
          // Initial resize to ensure proper scaling
          handleResize();
          
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);

    </script>
  </body>
</html>
